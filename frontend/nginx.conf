worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types text/css application/javascript application/json image/svg+xml font/woff2;

    server {
        listen 8080;
        server_name _;
        root /usr/share/nginx/html;

        # Self-hosted fonts -- immutable cache
        location /fonts/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # Hash-busted Vite assets -- immutable cache
        location /assets/ {
            add_header Cache-Control "public, max-age=31536000, immutable" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
        }

        # SPA fallback -- revalidate on every visit for fresh deploys
        location / {
            add_header Cache-Control "no-cache" always;
            add_header X-Frame-Options "DENY" always;
            add_header X-Content-Type-Options "nosniff" always;
            try_files $uri $uri/ /index.html;
        }

        # SSE streaming endpoint - disable buffering for real-time events
        location /api/stream {
            proxy_pass http://app:8000/api/v1/stream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Connection '';
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 86400s;
            chunked_transfer_encoding on;
        }

        location /api/ {
            proxy_pass http://app:8000/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
